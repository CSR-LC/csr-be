swagger: "2.0"
info:
  version: "0.0.1"
  title: Be
  description: |
    The API provides CSR backend API.

basePath: /api/
schemes:
  - http
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
consumes:
  - application/json
produces:
  - application/json

paths:  
  /v1/users:
    post:
      summary: Register a new user.
      tags:
        - Users
      operationId: postUser
      responses:
        201:
          description: Created
          schema:
            $ref: "#/definitions/CreateUserResponse"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
  /v1/users/me:
    get:
      summary: Get the current user data.
      security:
        - Bearer: []
      tags:
        - Users
      operationId: getCurrentUser
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/GetUserResponse"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    patch:
      summary: Edit selected fields of the current user.
      security:
        - Bearer: []
      tags:
        - Users
      operationId: patchUser
      consumes:
        - application/json
      parameters:
        - name: userPatch
          in: body
          description: The patch to apply to the user.
          required: true
          schema:
            $ref: "#/definitions/PatchRequest"
      responses:
        204:
          description: Success
        default:
          description: Unexpected error
          schema:
            $ref: "#/definitions/Error"
  /equipment/statuses:
    post:
      summary: Creating a new status.
      tags:
        - Status
      operationId: postStatus
      parameters:
        - name: name
          in: body
          description: Status Name
          required: true
          schema:
            $ref: "#/definitions/StatusName"
      responses:
        201:
          description: Status has been created
          schema: 
            $ref: "#/definitions/SuccessStatusOperationResponse" 
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    get:
      summary: List all statuses.
      tags:
        - Status
      operationId: GetStatuses
      responses:
        201:
          description: Success
          schema:
            $ref: "#/definitions/ListStatuses"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
  /equipment/statuses/{statusId}:
    parameters:
      - name: statusId
        in: path
        required: true
        description: status id
        type: string
    get:
      summary: Get status by id
      tags:
        - Status
      operationId: GetStatus
      responses:
        201:
          description: Status has been created
          schema: 
            $ref: "#/definitions/SuccessStatusOperationResponse" 
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    delete:
      summary: Delete status by id
      tags:
        - Status
      operationId: DeleteStatus
      responses:
        201:
          description: Status has been created
          schema: 
            $ref: "#/definitions/SuccessStatusOperationResponse" 
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"  
  /equipment:
    post:
      summary: Register a new equipment
      tags:
        - Equipment
      operationId: CreateNewEquipment
      consumes:
        - application/json
      parameters:
        - name: newEquipment
          in: body
          description: Create a new equipment
          required: true
          schema:
            $ref: "#/definitions/Equipment"
      responses:
        201:
          description: Equipment created
          schema:
            $ref: "#/definitions/EquipmentResponse"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    get:
      summary: Get all equipment
      tags:
        - Equipment
      operationId: GetAllEquipment
      responses:
        201:
          description: Success
          schema:
            $ref: "#/definitions/ListEquipment"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"

  /equipment/{equipmentId}:
    parameters:
      - name: equipmentId
        in: path
        required: true
        description: equipment id
        type: string
    get:
      summary: Get equipment by id
      tags:
        - Equipment
      operationId: GetEquipment
      responses:
        201:
          description: Equipment has been found
          schema:
            $ref: "#/definitions/Equipment"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    delete:
      summary: Delete equipment by id
      tags:
        - Equipment
      operationId: DeleteEquipment
      responses:
        201:
          description: Equipment has been deleted
          schema:
            $ref: "#/definitions/Equipment"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
    put:
      summary: Edit equipment by id
      tags:
        - Equipment
      operationId: EditEquipment
      parameters:
        - name: EditEquipment
          in: body
          description: Edit an equipment
          required: false
          schema:
            $ref: "#/definitions/Equipment"
      responses:
        201:
          description: Equipment edited
          schema:
            $ref: "#/definitions/Equipment"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"
  /findEquipment:
    post:
      summary: Equipment filtered list
      tags:
        - Equipment
      operationId: FindEquipment
      parameters:
        - name: FindEquipment
          in: body
          description: Filtered list of an equipment
          required: false
          schema:
            $ref: "#/definitions/Equipment"
      responses:
        201:
          description: Equipment has been found
          schema:
            $ref: "#/definitions/ListEquipment"
        default:
          description: Unexpected error.
          schema:
            $ref: "#/definitions/Error"

definitions:
  Error:
    type: object
    required:
      - data
    properties:
      data:
        type: object
        properties:
          correlationId:
            type: string
          message:
            type: string

  PatchRequest:
    type: array
    items:
      $ref: "#/definitions/PatchItem"
  PatchItem:
    type: object
    description: A JSONPatch document as defined by RFC 6902
    required:
      - op
      - path
    properties:
      from:
        description: A string containing a JSON Pointer value
        type: string
      op:
        description: The operation to be performed
        enum:
          - add
          - remove
          - replace
          - move
          - copy
          - test
        type: string
      path:
        description: A JSON-Pointer
        type: string
      value:
        description: The value to be used within the operations
        type: object

  # User
  User:
    type: object
    required:
      - id
      - createTime
    properties:
      id:
        type: string
      createTime:
        type: string
        format: date-time
  CreateUserResponse:
    type: object
    required:
      - data
    properties:
      data:
        type: object
        required:
          - id
        properties:
          id:
            type: string
  GetUserResponse:
    type: object
    required:
      - data
    properties:
      data:
        $ref: "#/definitions/User"

  #Status
  Status:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
      name:
        type: string
  ListStatuses:
    type: array
    items:
      $ref: "#/definitions/Status"
  SuccessStatusOperationResponse:
    type: object
    required:
      - data 
    properties:
      data:
        $ref: "#/definitions/Status"
  StatusName:          
    type: object
    required: 
      - name
    properties:
      name: 
        type: string
  # Equipment
  Equipment:
    type: object
    required:
      - sku
      - name
      - kind
      - status
      - rate_hour
      - rate_day
      - location
      - description
      - photo
    properties:
      sku:
        type: string
        example: "ABC012345678"
      name:
        type: string
        example: "Dog harness 3000"
      kind:
        type: integer
        example: 5
      status:
        type: integer
        example: 1
      rate_hour:
        type: integer
      rate_day:
        type: integer
      location:
        type: integer
        example: 71
      description:
        type: string
        example: "This is a dog harness.\nWARNING: do not put on cats!"
      photo:
        type: string
        example: "https://..."
  EquipmentResponse:
    type: object
    required:
      - id
      - sku
      - name
      - kind
      - status
      - rate_hour
      - rate_day
      - location
      - description
      - photo
    properties:
      id:
        type: string
        example: 2
      sku:
        type: string
        example: "ABC012345678"
      name:
        type: string
        example: "Dog harness 3000"
      kind:
        type: integer
        example: 5
      status:
        type: integer
        example: 1
      rate_hour:
        type: integer
      rate_day:
        type: integer
      location:
        type: integer
        example: 71
      description:
        type: string
        example: "This is a dog harness.\nWARNING: do not put on cats!"
      photo:
        type: string
        example: "https://..."
  ListEquipment:
    type: array
    items:
      $ref: "#/definitions/EquipmentResponse"



