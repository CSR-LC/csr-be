version: '3'
services:
  csr:
    build:
      context: ..
      dockerfile: ./int-test-infra/Dockerfile.int-test
    container_name: csr
    ports:
      - "8089:8089"
    expose:
      - 8089
    depends_on:
      - db
    networks:
      - go-network

  db:
    image: "postgres:14-alpine"
    container_name: db
    ports:
      - "9432:9432"
    expose:
      - 9432
    environment:
      - POSTGRES_USER=csr
      - POSTGRES_DB=csr
      - POSTGRES_PASSWORD=password
    command: -p 9432
    networks:
      - go-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U csr -p 9432" ]
      interval: 2s
      timeout: 2s
      retries: 5

networks:
  go-network: