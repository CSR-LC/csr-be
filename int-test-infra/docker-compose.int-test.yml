version: '3'
services:
  csr:
    image: csr:int-test
    container_name: csr
    ports:
      - "8089:8089"
    networks:
      - go-network

  db:
    image: "postgres:14-alpine"
    container_name: db
    environment:
      - POSTGRES_USER=csr
      - POSTGRES_DB=csr
      - POSTGRES_PASSWORD=password
    command: -p 9432
    networks:
      - go-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U csr -p 9432" ]
      interval: 2s
      timeout: 2s
      retries: 5

networks:
  go-network: