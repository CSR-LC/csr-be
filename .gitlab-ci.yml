
variables:
#  START_DEPLOY_TO_STAGE: "true"
  START_DEPLOY_TO_PROD: "true"

stages:
  - test
  - build
  - deploy
  - deploy_prod
test:
  image: golang:1.17-alpine
  stage: test
  coverage: '/total:\s+\(statements\)\s+(\d+.\d+\%)/'
  variables:
    min_coverage: 80
    coverage_result: '/total:\s+\(statements\)\s+(\d+.\d+)\%/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - apk add --update --no-cache git build-base && rm -rf /var/cache/apk/* 
    - go install github.com/go-swagger/go-swagger/cmd/swagger@latest && go install entgo.io/ent/cmd/ent@latest
    - make generate
    - go test -race ./... -coverprofile=coverage.out
    - go tool cover -func=coverage.out

lint:
  image: registry.gitlab.com/gitlab-org/gitlab-build-images:golangci-lint-alpine
  when: manual
  stage: test
  script:
    - '[ -e .golangci.yml ] || cp /golangci/.golangci.yml .'
    - golangci-lint run --out-format tab | tee ./report.txt
  artifacts:
    paths:
      - report.txt
  allow_failure: true

build:
  image: golang:1.17-alpine
  stage: build
  script:
    - apk add --update --no-cache git make && rm -rf /var/cache/apk/* 
    - go install github.com/go-swagger/go-swagger/cmd/swagger@latest && go install entgo.io/ent/cmd/ent@latest
    - make generate
    - CGO_ENABLED=0 GOARCH=amd64 GOOS=linux go build -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/csr $CI_PROJECT_DIR/cmd/swagger/main.go
  artifacts:
    paths:
      - csr
      
deploy_stage:
  image: kroniak/ssh-client
  
  stage: deploy
  rules:
    - if: $START_DEPLOY_TO_STAGE == "true"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  script:
    - echo "test"
    # - mkdir -p ~/.ssh
    # - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    # - chmod -R 700 ~/.ssh
    # - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    # - chmod 644 ~/.ssh/known_hosts
    # - scp -P$SSH_PORT -r ./csr $SSH_USER@$SSH_HOST:~/tmp_csr
    # - scp -P$SSH_PORT -r ./db $SSH_USER@$SSH_HOST:/var/www/csr/
    # - ssh -p$SSH_PORT $SSH_USER@$SSH_HOST 'sudo service csr stop && cp ~/tmp_csr /var/www/csr/server && sudo service csr start'

deploy_to_prod:
  image: kroniak/ssh-client
  stage: deploy
  rules:
    - if: $START_DEPLOY_TO_PROD == "true"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  script:
   - echo "kek"
   - mkdir -p ~/.ssh
   - echo "$SSH_PROD_PRIVATE_KEY" > ~/.ssh/id_rsa
   - chmod -R 700 ~/.ssh
   - echo "$SSH_PROD_KNOWN_HOSTS" >> ~/.ssh/known_hosts
   - cat ~/.ssh/known_hosts
   - chmod 644 ~/.ssh/known_hosts
   - scp -P$SSH_PROD_PORT -o "StrictHostKeyChecking=no" -r ./csr $SSH_PROD_USER@$SSH_PROD_HOST:/go/
   - scp -P$SSH_PROD_PORT -r ./db $SSH_PROD_USER@$SSH_PROD_HOST:/go/ -o "StrictHostKeyChecking=no"
   - ssh -p$SSH_PORT $SSH_USER@$SSH_HOST './go/setenv_rerun  main' -o "StrictHostKeyChecking=no"
